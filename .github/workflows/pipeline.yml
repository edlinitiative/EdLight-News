name: EdLight News Pipeline

on:
  # Run at :00 every 2 hours (12 runs/day). Cloud Scheduler fires at :30 every 2 hours.
  # Together: ~1-hour cadence, 24 ticks/day total — down from 96/day that caused the $285+$700 bill.
  schedule:
    - cron: "0 */2 * * *"
  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install Chromium (for Playwright image rendering)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends chromium-browser || \
          sudo apt-get install -y --no-install-recommends chromium
          echo "PLAYWRIGHT_CHROMIUM_PATH=$(which chromium-browser || which chromium)" >> $GITHUB_ENV

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo build --filter=@edlight-news/worker...

      - name: Run pipeline
        working-directory: apps/worker
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_API_HOST: ${{ secrets.IG_API_HOST }}
          # LLM providers
          LLM_PROVIDER: gemini
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_REVIEWER_PROVIDER: ${{ secrets.LLM_REVIEWER_PROVIDER }}
          LLM_REVIEWER_MODEL: ${{ secrets.LLM_REVIEWER_MODEL }}
          # Image sourcing
          FLICKR_API_KEY: ${{ secrets.FLICKR_API_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          GOOGLE_CSE_API_KEY: ${{ secrets.GOOGLE_CSE_API_KEY }}
          GOOGLE_CSE_CX: ${{ secrets.GOOGLE_CSE_CX }}
          Unsplash_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          # Keep GHA ticks lightweight — Cloud Run (every 30 min) does the heavy lifting.
          GENERATE_BATCH_LIMIT: "3"
          IMAGE_BATCH_LIMIT: "2"
          PROCESS_BATCH_LIMIT: "10"
        run: npx tsx src/scripts/runTick.ts
