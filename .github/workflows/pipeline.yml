name: EdLight News Pipeline

on:
  # FALLBACK runner — only fires on manual trigger or as a safety net.
  # Primary tick driver is Cloud Scheduler → Cloud Run (see deploy-worker.yml).
  # Keep workflow_dispatch so we can manually trigger a tick if Cloud Run is down.
  workflow_dispatch:
    inputs:
      mode:
        description: "How to run the tick"
        required: true
        type: choice
        default: "cloud-run"
        options:
          - cloud-run     # ping Cloud Run /tick (fast, uses prod env)
          - github-runner # full local pipeline (slow, fallback if Cloud Run is down)

env:
  PROJECT_ID: edlight-news
  REGION: us-central1
  SERVICE: edlight-news-worker

jobs:
  # ── Fast path: ping the existing Cloud Run service ──────────────────────────
  trigger-cloud-run:
    if: ${{ github.event.inputs.mode == 'cloud-run' }}
    name: Trigger Cloud Run /tick
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: POST /tick
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "Pinging $URL/tick …"
          # Cloud Run timeout is 900 s; mirror that on curl side.
          curl -sS -X POST \
            -H "x-api-key: ${{ secrets.WORKER_API_KEY }}" \
            -H "Content-Type: application/json" \
            --max-time 900 \
            "$URL/tick" \
            -o /tmp/tick-response.json -w "HTTP %{http_code}\n"
          echo "── /tick response ──"
          cat /tmp/tick-response.json
          echo
          echo "### ✅ /tick triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Service URL:** $URL" >> $GITHUB_STEP_SUMMARY

  # ── Slow path: build everything and run the pipeline locally on the runner ──
  run-pipeline:
    if: ${{ github.event.inputs.mode == 'github-runner' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Chromium (for Playwright image rendering)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends chromium-browser || \
          sudo apt-get install -y --no-install-recommends chromium
          echo "PLAYWRIGHT_CHROMIUM_PATH=$(which chromium-browser || which chromium)" >> $GITHUB_ENV

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo build --filter=@edlight-news/worker...

      - name: Run pipeline
        working-directory: apps/worker
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_API_HOST: ${{ secrets.IG_API_HOST }}
          # LLM providers
          # Switched from gemini: free tier is only 20 req/day — exhausted by 2nd pipeline tick.
          # Mistral (paid key) has no per-day cap at this usage level.
          LLM_PROVIDER: mistral
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_REVIEWER_PROVIDER: ${{ secrets.LLM_REVIEWER_PROVIDER }}
          LLM_REVIEWER_MODEL: ${{ secrets.LLM_REVIEWER_MODEL }}
          # Image sourcing
          FLICKR_API_KEY: ${{ secrets.FLICKR_API_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          GOOGLE_CSE_API_KEY: ${{ secrets.GOOGLE_CSE_API_KEY }}
          GOOGLE_CSE_CX: ${{ secrets.GOOGLE_CSE_CX }}
          Unsplash_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          # Small batches + high frequency (every 15 min) = fast incremental processing.
          GENERATE_BATCH_LIMIT: "3"
          IMAGE_BATCH_LIMIT: "2"
          PROCESS_BATCH_LIMIT: "10"
        run: npx tsx src/scripts/runTick.ts
