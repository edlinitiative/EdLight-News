# ──────────────────────────────────────────────────────────────────────────────
# Test gate — runs on every PR and every push to main.
#
# This complements deploy-worker.yml (which gates the prod deploy on tests).
# Catches regressions even on PRs that don't touch worker paths and on
# branches that never hit deploy.
# ──────────────────────────────────────────────────────────────────────────────
name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Lint + typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (all packages)
        run: pnpm turbo typecheck

      - name: Worker tests (classify regression suite, etc.)
        run: pnpm --filter @edlight-news/worker test

      - name: Generator tests (IG formatters, normalize, etc.)
        run: pnpm --filter @edlight-news/generator test
