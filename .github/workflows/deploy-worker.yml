# ──────────────────────────────────────────────────────────────────────────────
# Deploy Worker to Cloud Run + upsert Cloud Scheduler (every 15 min)
#
# Cloud Scheduler → Cloud Run is the PRIMARY tick driver (reliable, 15-min).
# pipeline.yml (GHA cron) stays as a FALLBACK — see that file for details.
# ──────────────────────────────────────────────────────────────────────────────
name: Deploy Worker to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "apps/worker/**"
      - "packages/firebase/**"
      - "packages/generator/**"
      - "packages/renderer/**"
      - "packages/scraper/**"
      - "packages/publisher/**"
      - "packages/types/**"
      - "tsconfig.base.json"
      - "infra/firebase/firestore.indexes.json"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

env:
  PROJECT_ID: edlight-news
  REGION: us-central1
  SERVICE: edlight-news-worker
  IMAGE: us-central1-docker.pkg.dev/edlight-news/edlight-news/worker

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # ── Firestore composite indexes (idempotent — safe to re-run) ──────────
      - name: Ensure Firestore indexes
        run: |
          gcloud firestore indexes composite create \
            --project=${{ env.PROJECT_ID }} \
            --collection-group=ig_queue \
            --field-config field-path=status,order=ascending \
            --field-config field-path=score,order=descending \
            --quiet 2>/dev/null || true
          gcloud firestore indexes composite create \
            --project=${{ env.PROJECT_ID }} \
            --collection-group=ig_queue \
            --field-config field-path=status,order=ascending \
            --field-config field-path=scheduledFor,order=ascending \
            --quiet 2>/dev/null || true
          gcloud firestore indexes composite create \
            --project=${{ env.PROJECT_ID }} \
            --collection-group=ig_queue \
            --field-config field-path=status,order=ascending \
            --field-config field-path=updatedAt,order=descending \
            --quiet 2>/dev/null || true
          gcloud firestore indexes composite create \
            --project=${{ env.PROJECT_ID }} \
            --collection-group=ig_queue \
            --field-config field-path=status,order=ascending \
            --field-config field-path=updatedAt,order=ascending \
            --quiet 2>/dev/null || true
          echo "Firestore indexes ensured"

      # ── Build & push Docker image ──────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            --file apps/worker/Dockerfile \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # ── Deploy to Cloud Run (scale-to-zero, auth-required) ─────────────────
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          # Scale-to-zero between scheduler ticks — only pay for actual compute.
          # 2Gi memory: Chromium (Playwright) + LLM payloads need headroom.
          # 900s timeout: full tick pipeline can take 5–15 min on heavy ticks.
          flags: >-
            --min-instances=0
            --max-instances=1
            --memory=2Gi
            --cpu=1
            --timeout=900
            --no-allow-unauthenticated
            --service-account=firebase-adminsdk-fbsvc@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
          env_vars: |
            FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
            IG_ACCESS_TOKEN=${{ secrets.IG_ACCESS_TOKEN }}
            IG_USER_ID=${{ secrets.IG_USER_ID }}
            IG_API_HOST=${{ secrets.IG_API_HOST }}
            LLM_PROVIDER=mistral
            MISTRAL_API_KEY=${{ secrets.MISTRAL_API_KEY }}
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            LLM_REVIEWER_PROVIDER=${{ secrets.LLM_REVIEWER_PROVIDER }}
            LLM_REVIEWER_MODEL=${{ secrets.LLM_REVIEWER_MODEL }}
            FLICKR_API_KEY=${{ secrets.FLICKR_API_KEY }}
            BRAVE_SEARCH_API_KEY=${{ secrets.BRAVE_SEARCH_API_KEY }}
            GOOGLE_CSE_API_KEY=${{ secrets.GOOGLE_CSE_API_KEY }}
            GOOGLE_CSE_CX=${{ secrets.GOOGLE_CSE_CX }}
            Unsplash_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }}
            PROCESS_BATCH_LIMIT=10
            GENERATE_BATCH_LIMIT=3
            IMAGE_BATCH_LIMIT=5

      - name: Get service URL
        id: service_url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      # ── Cloud Scheduler: every 15 minutes (96 ticks/day) ──────────────────
      # This is the PRIMARY tick driver. Reliable to the minute, no GHA
      # throttling. OIDC token auto-authenticates against Cloud Run.
      - name: Upsert Cloud Scheduler job
        run: |
          TICK_URL="${{ steps.service_url.outputs.url }}/tick"
          SA="cloud-scheduler-invoker@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"

          if gcloud scheduler jobs describe edlight-news-pipeline \
               --location=${{ env.REGION }} --quiet 2>/dev/null; then
            gcloud scheduler jobs update http edlight-news-pipeline \
              --location=${{ env.REGION }} \
              --schedule="*/15 * * * *" \
              --time-zone="America/Port-au-Prince" \
              --uri="$TICK_URL" \
              --http-method=POST \
              --oidc-service-account-email="$SA" \
              --oidc-token-audience="$TICK_URL" \
              --attempt-deadline=900s \
              --quiet
          else
            gcloud scheduler jobs create http edlight-news-pipeline \
              --location=${{ env.REGION }} \
              --schedule="*/15 * * * *" \
              --time-zone="America/Port-au-Prince" \
              --uri="$TICK_URL" \
              --http-method=POST \
              --oidc-service-account-email="$SA" \
              --oidc-token-audience="$TICK_URL" \
              --attempt-deadline=900s \
              --quiet
          fi

      - name: Summary
        run: |
          echo "### ✅ Worker deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** ${{ steps.service_url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ env.IMAGE }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Scheduler:** \`*/15 * * * *\` (every 15 min, Haiti TZ)" >> $GITHUB_STEP_SUMMARY
          echo "- **Memory:** 2Gi, scale-to-zero" >> $GITHUB_STEP_SUMMARY
