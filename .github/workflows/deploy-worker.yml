name: Deploy Worker to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "apps/worker/**"
      - "packages/**"
      - "tsconfig.base.json"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

env:
  PROJECT_ID: edlight-news
  REGION: us-central1
  SERVICE: edlight-news-worker
  # Artifact Registry image path — repository created once with:
  #   gcloud artifacts repositories create edlight-news \
  #     --repository-format=docker --location=us-central1
  IMAGE: us-central1-docker.pkg.dev/edlight-news/edlight-news/worker

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            --file apps/worker/Dockerfile \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          # Scale to zero between invocations — driven by Cloud Scheduler (free tier)
          # Uses firebase-adminsdk SA as identity → no private key needed (ADC)
          flags: >-
            --min-instances=0
            --max-instances=1
            --memory=1Gi
            --cpu=1
            --timeout=3600
            --no-allow-unauthenticated
            --service-account=firebase-adminsdk-fbsvc@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
          env_vars: |
            FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
            IG_ACCESS_TOKEN=${{ secrets.IG_ACCESS_TOKEN }}
            IG_USER_ID=${{ secrets.IG_USER_ID }}
            IG_API_HOST=${{ secrets.IG_API_HOST }}
            PROCESS_BATCH_LIMIT=15
            IMAGE_BATCH_LIMIT=5

      - name: Get service URL
        id: service_url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT


      - name: Upsert Cloud Scheduler job
        run: |
          # ⚠️  SCHEDULING: Cloud Scheduler fires at :15 and :45 ONLY.
          # GitHub Actions pipeline.yml fires at :00 and :30 (runs directly in GHA runner).
          # Together they give ~15-min effective cadence at ZERO cost.
          # DO NOT change this to */15 — that would overlap with GHA and double work+cost.
          TICK_URL="${{ steps.service_url.outputs.url }}/tick"
          SA="cloud-scheduler-invoker@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          if gcloud scheduler jobs describe edlight-news-pipeline \
               --location=${{ env.REGION }} --quiet 2>/dev/null; then
            gcloud scheduler jobs update http edlight-news-pipeline \
              --location=${{ env.REGION }} \
              --schedule="15,45 * * * *" \
              --uri="$TICK_URL" \
              --http-method=POST \
              --oidc-service-account-email="$SA" \
              --attempt-deadline=1800s \
              --quiet
          else
            gcloud scheduler jobs create http edlight-news-pipeline \
              --location=${{ env.REGION }} \
              --schedule="15,45 * * * *" \
              --uri="$TICK_URL" \
              --http-method=POST \
              --oidc-service-account-email="$SA" \
              --attempt-deadline=1800s \
              --quiet
          fi

      - name: Show service URL
        run: |
          echo "Worker deployed at: ${{ steps.service_url.outputs.url }}"
          echo "WORKER_URL=${{ steps.service_url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
