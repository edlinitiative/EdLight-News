# ──────────────────────────────────────────────────────────────────────────────
# Deploy Worker to Cloud Run + upsert Cloud Scheduler (every 15 min)
#
# Cloud Scheduler → Cloud Run is the PRIMARY tick driver (reliable, 15-min).
# pipeline.yml (GHA cron) stays as a FALLBACK — see that file for details.
# ──────────────────────────────────────────────────────────────────────────────
name: Deploy Worker to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "apps/worker/**"
      - "packages/firebase/**"
      - "packages/generator/**"
      - "packages/renderer/**"
      - "packages/scraper/**"
      - "packages/publisher/**"
      - "packages/types/**"
      - "tsconfig.base.json"
      - "infra/firebase/firestore.indexes.json"
      - "infra/searxng/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

env:
  PROJECT_ID: edlight-news
  REGION: us-central1
  SERVICE: edlight-news-worker
  IMAGE: us-central1-docker.pkg.dev/edlight-news/edlight-news/worker
  SERVICE_SEARXNG: edlight-news-searxng
  IMAGE_SEARXNG: us-central1-docker.pkg.dev/edlight-news/edlight-news/searxng

jobs:
  # ── Gate: regression tests must pass before any image is built/deployed ──
  # Catches things like the bourses/finance disambiguation regression
  # (see apps/worker/src/services/classify.test.ts).
  test:
    name: Test (worker + generator)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate pipeline guardrails
        run: node scripts/ci/validate-pipeline-guards.mjs

      # turbo respects the ^build dep graph declared in turbo.json,
      # so workspace packages (@edlight-news/firebase, /types, …) are
      # built before the worker is type-checked or tested.
      - name: Typecheck worker (with deps)
        run: pnpm turbo typecheck --filter=@edlight-news/worker

      - name: Test worker (with deps)
        run: pnpm turbo test --filter=@edlight-news/worker

      - name: Test generator (with deps)
        run: pnpm turbo test --filter=@edlight-news/generator

  deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # ── Firestore composite indexes (idempotent — safe to re-run) ──────────
      - name: Ensure Firestore indexes
        run: |
          gcloud firestore indexes composite create \
            --project=${{ env.PROJECT_ID }} \
            --collection-group=ig_queue \
            --field-config field-path=status,order=ascending \
            --field-config field-path=score,order=descending \
            --quiet 2>/dev/null || true
          gcloud firestore indexes composite create \
            --project=${{ env.PROJECT_ID }} \
            --collection-group=ig_queue \
            --field-config field-path=status,order=ascending \
            --field-config field-path=scheduledFor,order=ascending \
            --quiet 2>/dev/null || true
          gcloud firestore indexes composite create \
            --project=${{ env.PROJECT_ID }} \
            --collection-group=ig_queue \
            --field-config field-path=status,order=ascending \
            --field-config field-path=updatedAt,order=descending \
            --quiet 2>/dev/null || true
          gcloud firestore indexes composite create \
            --project=${{ env.PROJECT_ID }} \
            --collection-group=ig_queue \
            --field-config field-path=status,order=ascending \
            --field-config field-path=updatedAt,order=ascending \
            --quiet 2>/dev/null || true
          for COLLECTION in fb_queue; do
            gcloud firestore indexes composite create \
              --project=${{ env.PROJECT_ID }} \
              --collection-group=$COLLECTION \
              --field-config field-path=status,order=ascending \
              --field-config field-path=score,order=descending \
              --quiet 2>/dev/null || true
            gcloud firestore indexes composite create \
              --project=${{ env.PROJECT_ID }} \
              --collection-group=$COLLECTION \
              --field-config field-path=status,order=ascending \
              --field-config field-path=scheduledFor,order=ascending \
              --quiet 2>/dev/null || true
            gcloud firestore indexes composite create \
              --project=${{ env.PROJECT_ID }} \
              --collection-group=$COLLECTION \
              --field-config field-path=status,order=ascending \
              --field-config field-path=updatedAt,order=descending \
              --quiet 2>/dev/null || true
            gcloud firestore indexes composite create \
              --project=${{ env.PROJECT_ID }} \
              --collection-group=$COLLECTION \
              --field-config field-path=status,order=ascending \
              --field-config field-path=updatedAt,order=ascending \
              --quiet 2>/dev/null || true
          done
          # items: vertical + createdAt — required by listOpportunitiesNeedingScholarshipPromotion
          # (powers the scholarship auto-discovery pipeline added in PR #21).
          gcloud firestore indexes composite create \
            --project=${{ env.PROJECT_ID }} \
            --collection-group=items \
            --field-config field-path=vertical,order=ascending \
            --field-config field-path=createdAt,order=descending \
            --quiet 2>/dev/null || true
          echo "Firestore indexes ensured"

      # ── Sync curated scholarships → Firestore (idempotent upsert) ──────────
      # Runs the seed script with Firebase admin creds so any additions to
      # apps/worker/src/data/scholarships_curated.json land in production on
      # every deploy. Fails-soft so a bad entry doesn't block the worker
      # rollout — the seed script logs the offending name + zod issues.
      - name: Sync curated scholarships
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: |
          pnpm --filter @edlight-news/worker seed:scholarships || \
            echo "::warning::seed:scholarships failed — check JSON validity"

      # ── Build & push Docker image ──────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            --file apps/worker/Dockerfile \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # ── Build & deploy SearXNG fallback service (Cloud Run) ──────────────
      - name: Build SearXNG Docker image
        run: |
          docker build \
            --file infra/searxng/Dockerfile \
            --tag ${{ env.IMAGE_SEARXNG }}:${{ github.sha }} \
            --tag ${{ env.IMAGE_SEARXNG }}:latest \
            infra/searxng

      - name: Push SearXNG Docker image
        run: |
          docker push ${{ env.IMAGE_SEARXNG }}:${{ github.sha }}
          docker push ${{ env.IMAGE_SEARXNG }}:latest

      - name: Deploy SearXNG to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_SEARXNG }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_SEARXNG }}:${{ github.sha }}
          flags: >-
            --min-instances=0
            --max-instances=1
            --memory=512Mi
            --cpu=1
            --timeout=120
            --allow-unauthenticated

      - name: Get SearXNG service URL
        id: searxng_url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_SEARXNG }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Set IAM policy for unauthenticated SearXNG access
        run: |
          gcloud run services add-iam-policy-binding ${{ env.SERVICE_SEARXNG }} \
            --region=${{ env.REGION }} \
            --member="allUsers" \
            --role="roles/run.invoker" \
            --quiet || echo "WARNING: Could not set IAM policy for SearXNG"

      # ── Deploy to Cloud Run (scale-to-zero, auth-required) ─────────────────
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          # Scale-to-zero between scheduler ticks — only pay for actual compute.
          # 2Gi memory: Chromium (Playwright) + LLM payloads need headroom.
          # 900s timeout: full tick pipeline can take 5–15 min on heavy ticks.
          # --allow-unauthenticated: auth is handled at the app level via
          # WORKER_API_KEY, so the admin app (Vercel) can trigger /process-ig-now.
          # Cloud Scheduler still sends OIDC tokens which the app also accepts.
          flags: >-
            --min-instances=0
            --max-instances=1
            --memory=2Gi
            --cpu=1
            --timeout=900
            --allow-unauthenticated
            --service-account=firebase-adminsdk-fbsvc@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
          env_vars: |
            FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
            IG_ACCESS_TOKEN=${{ secrets.IG_ACCESS_TOKEN }}
            IG_USER_ID=${{ secrets.IG_USER_ID }}
            IG_API_HOST=${{ secrets.IG_API_HOST }}
            FB_PAGE_ACCESS_TOKEN=${{ secrets.FB_PAGE_ACCESS_TOKEN }}
            FB_PAGE_ID=${{ secrets.FB_PAGE_ID }}
            LLM_PROVIDER=mistral
            MISTRAL_API_KEY=${{ secrets.MISTRAL_API_KEY }}
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            LLM_REVIEWER_PROVIDER=${{ secrets.LLM_REVIEWER_PROVIDER }}
            LLM_REVIEWER_MODEL=${{ secrets.LLM_REVIEWER_MODEL }}
            FLICKR_API_KEY=${{ secrets.FLICKR_API_KEY }}
            BRAVE_SEARCH_API_KEY=${{ secrets.BRAVE_SEARCH_API_KEY }}
            GOOGLE_CSE_API_KEY=${{ secrets.GOOGLE_CSE_API_KEY }}
            GOOGLE_CSE_CX=${{ secrets.GOOGLE_CSE_CX }}
            Unsplash_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }}
            WORKER_API_KEY=${{ secrets.WORKER_API_KEY }}
            GOOGLE_VISION_API_KEY=${{ secrets.GOOGLE_VISION_API_KEY }}
            SEARXNG_URL=${{ steps.searxng_url.outputs.url }}
            PROCESS_BATCH_LIMIT=25
            GENERATE_BATCH_LIMIT=15
            IMAGE_BATCH_LIMIT=5
            IG_LLM_VALIDATE_PUBLISHER=true
            IG_LLM_IMAGE_FINDER=true

      - name: Get service URL
        id: service_url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      # ── Ensure Cloud Scheduler can invoke Cloud Run ───────────────────────
      # Organization policy may block allUsers/public invoker bindings.
      # Scheduler uses OIDC with this dedicated SA, so grant it explicit
      # run.invoker access to avoid 403/permission-denied scheduler attempts.
      - name: Grant invoker to Scheduler SA
        run: |
          SCHEDULER_SA="cloud-scheduler-invoker@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          gcloud run services add-iam-policy-binding ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --member="serviceAccount:$SCHEDULER_SA" \
            --role="roles/run.invoker" \
            --quiet

      # ── Ensure allUsers can invoke the service ─────────────────────────────
      # The --allow-unauthenticated flag in the deploy step may silently fail
      # if the deploying SA lacks IAM permissions. This explicit step ensures
      # the policy is set. App-level auth (WORKER_API_KEY) secures endpoints.
      - name: Set IAM policy for unauthenticated access
        run: |
          gcloud run services add-iam-policy-binding ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --member="allUsers" \
            --role="roles/run.invoker" \
            --quiet || echo "WARNING: Could not set IAM policy — admin Publish Now may not work"

      # ── Cloud Scheduler: every 15 minutes (96 ticks/day) ──────────────────
      # This is the PRIMARY tick driver. Reliable to the minute, no GHA
      # throttling. OIDC token auto-authenticates against Cloud Run.
      - name: Upsert Cloud Scheduler job
        run: |
          TICK_URL="${{ steps.service_url.outputs.url }}/tick"
          SA="cloud-scheduler-invoker@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"

          if gcloud scheduler jobs describe edlight-news-pipeline \
               --location=${{ env.REGION }} --quiet 2>/dev/null; then
            gcloud scheduler jobs update http edlight-news-pipeline \
              --location=${{ env.REGION }} \
              --schedule="*/15 * * * *" \
              --time-zone="America/Port-au-Prince" \
              --uri="$TICK_URL" \
              --http-method=POST \
              --oidc-service-account-email="$SA" \
              --oidc-token-audience="$TICK_URL" \
              --attempt-deadline=900s \
              --quiet
          else
            gcloud scheduler jobs create http edlight-news-pipeline \
              --location=${{ env.REGION }} \
              --schedule="*/15 * * * *" \
              --time-zone="America/Port-au-Prince" \
              --uri="$TICK_URL" \
              --http-method=POST \
              --oidc-service-account-email="$SA" \
              --oidc-token-audience="$TICK_URL" \
              --attempt-deadline=900s \
              --quiet
          fi

      # ── Fast IG Scheduler: every 3 minutes ────────────────────────────────
      # Lightweight: only runs processIgScheduled() (no ingest/generate).
      # Picks up "Publish Now" items within 3 min instead of waiting 15 min.
      # Does nothing if no items are due — returns in <1 second.
      - name: Upsert fast IG Scheduler job
        run: |
          IG_URL="${{ steps.service_url.outputs.url }}/process-ig-now"
          SA="cloud-scheduler-invoker@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"

          if gcloud scheduler jobs describe edlight-news-process-ig \
               --location=${{ env.REGION }} --quiet 2>/dev/null; then
            gcloud scheduler jobs update http edlight-news-process-ig \
              --location=${{ env.REGION }} \
              --schedule="*/3 * * * *" \
              --time-zone="America/Port-au-Prince" \
              --uri="$IG_URL" \
              --http-method=POST \
              --oidc-service-account-email="$SA" \
              --oidc-token-audience="$IG_URL" \
              --attempt-deadline=120s \
              --quiet
          else
            gcloud scheduler jobs create http edlight-news-process-ig \
              --location=${{ env.REGION }} \
              --schedule="*/3 * * * *" \
              --time-zone="America/Port-au-Prince" \
              --uri="$IG_URL" \
              --http-method=POST \
              --oidc-service-account-email="$SA" \
              --oidc-token-audience="$IG_URL" \
              --attempt-deadline=120s \
              --quiet
          fi

      - name: Summary
        run: |
          echo "### ✅ Worker deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** ${{ steps.service_url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **SearXNG:** ${{ steps.searxng_url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ env.IMAGE }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **SearXNG Image:** \`${{ env.IMAGE_SEARXNG }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Scheduler (full pipeline):** \`*/15 * * * *\` (every 15 min)" >> $GITHUB_STEP_SUMMARY
          echo "- **Scheduler (IG fast-path):** \`*/3 * * * *\` (every 3 min)" >> $GITHUB_STEP_SUMMARY
          echo "- **Memory:** 2Gi, scale-to-zero" >> $GITHUB_STEP_SUMMARY
