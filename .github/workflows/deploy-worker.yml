name: Deploy Worker to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "apps/worker/**"
      - "packages/firebase/**"
      - "packages/generator/**"
      - "packages/renderer/**"
      - "packages/scraper/**"
      - "packages/types/**"
      - "tsconfig.base.json"
      - "infra/firebase/firestore.indexes.json"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

env:
  PROJECT_ID: edlight-news
  REGION: us-central1
  SERVICE: edlight-news-worker
  # Artifact Registry image path — repository created once with:
  #   gcloud artifacts repositories create edlight-news \
  #     --repository-format=docker --location=us-central1
  IMAGE: us-central1-docker.pkg.dev/edlight-news/edlight-news/worker

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Deploy Firestore indexes
        run: |
          gcloud firestore indexes composite create \
            --project=${{ env.PROJECT_ID }} \
            --collection-group=ig_queue \
            --field-config field-path=status,order=ascending \
            --field-config field-path=score,order=descending \
            --quiet 2>/dev/null || true
          gcloud firestore indexes composite create \
            --project=${{ env.PROJECT_ID }} \
            --collection-group=ig_queue \
            --field-config field-path=status,order=ascending \
            --field-config field-path=scheduledFor,order=ascending \
            --quiet 2>/dev/null || true
          gcloud firestore indexes composite create \
            --project=${{ env.PROJECT_ID }} \
            --collection-group=ig_queue \
            --field-config field-path=status,order=ascending \
            --field-config field-path=updatedAt,order=descending \
            --quiet 2>/dev/null || true
          gcloud firestore indexes composite create \
            --project=${{ env.PROJECT_ID }} \
            --collection-group=ig_queue \
            --field-config field-path=status,order=ascending \
            --field-config field-path=updatedAt,order=ascending \
            --quiet 2>/dev/null || true
          echo "Firestore indexes ensured"

      - name: Build Docker image
        run: |
          docker build \
            --file apps/worker/Dockerfile \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          # Scale to zero between invocations — driven by Cloud Scheduler (free tier)
          # Uses firebase-adminsdk SA as identity → no private key needed (ADC)
          flags: >-
            --min-instances=0
            --max-instances=1
            --memory=1Gi
            --cpu=1
            --timeout=900
            --no-allow-unauthenticated
            --service-account=firebase-adminsdk-fbsvc@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
          env_vars: |
            FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
            IG_ACCESS_TOKEN=${{ secrets.IG_ACCESS_TOKEN }}
            IG_USER_ID=${{ secrets.IG_USER_ID }}
            IG_API_HOST=${{ secrets.IG_API_HOST }}
            PROCESS_BATCH_LIMIT=10
            GENERATE_BATCH_LIMIT=3
            IMAGE_BATCH_LIMIT=2

      - name: Get service URL
        id: service_url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT


      - name: Upsert Cloud Scheduler job
        run: |
          # ⚠️  SCHEDULING: Cloud Scheduler fires at :30 every 2 hours (12 ticks/day).
          # GitHub Actions pipeline.yml fires at :00 every 2 hours (12 ticks/day).
          # Together they give ~1-hour effective cadence — 24 ticks/day total.
          # Changing this back to */30 cost ~$700/month in Cloud Run + Gemini fees.
          TICK_URL="${{ steps.service_url.outputs.url }}/tick"
          SA="cloud-scheduler-invoker@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          if gcloud scheduler jobs describe edlight-news-pipeline \
               --location=${{ env.REGION }} --quiet 2>/dev/null; then
            gcloud scheduler jobs update http edlight-news-pipeline \
              --location=${{ env.REGION }} \
              --schedule="30 */2 * * *" \
              --uri="$TICK_URL" \
              --http-method=POST \
              --oidc-service-account-email="$SA" \
              --attempt-deadline=900s \
              --quiet
          else
            gcloud scheduler jobs create http edlight-news-pipeline \
              --location=${{ env.REGION }} \
              --schedule="30 */2 * * *" \
              --uri="$TICK_URL" \
              --http-method=POST \
              --oidc-service-account-email="$SA" \
              --attempt-deadline=900s \
              --quiet
          fi

      - name: Show service URL
        run: |
          echo "Worker deployed at: ${{ steps.service_url.outputs.url }}"
          echo "WORKER_URL=${{ steps.service_url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
